<article
  [routerLink]="['/product', product().id]"
  class="w-full min-h-112.5 h-auto rounded-radius border-2 border-border cursor-pointer"
>
  <header class="h-65 w-full overflow-hidden relative rounded-t-radius pointer-events-none">
    <img
      [ngSrc]="product().image"
      priority
      fill
      [alt]="product().name"
      class="w-full h-full object-center object-cover"
    />
  </header>

  <div class="py-4 px-3 flex flex-col gap-5">
    <div class="flex flex-col gap-3">
      <h4 class="text-foreground md:text-[22px] text-xl font-bold">{{ product().name }}</h4>
      <p class="text-muted-foreground font-medium md:text-[16px] text-[15px]">
        {{ utils.truncateText({ text: product().description, length: 40 }) }}
      </p>
      <div class="flex items-center gap-1">
        <svg
          lucideStar
          [size]="20"
          strokeWidth="0"
          class="fill-primary"
        ></svg>
        <span class="font-medium text-foreground text-[15.5px]">{{ product().rate }}</span>
      </div>
    </div>

    <button
      (click)="onAddToCart($event)"
      class="btn bg-primary mt-auto flex! items-center! gap-2!"
    >
      @if (isLoading()) {
        <svg
          lucideLoader
          [size]="18"
          class="animate-spin"
        ></svg>
        Adding to cart..
      } @else {
        Add to cart
      }
    </button>
  </div>
</article>
