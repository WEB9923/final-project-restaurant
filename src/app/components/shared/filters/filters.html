<div class="sticky top-20 p-4 rounded-radius border-2 border-border bg-card w-full">
  <h4 class="lg:text-xl text-lg font-bold">Filters</h4>

  <div class="space-y-4 w-full mt-5">
    <div class="">
      <label
        for="search"
        class="font-semibold text-[16px]"
      >
        Search
      </label>
      <input
        type="text"
        class="input h-9! w-full"
        id="search"
        placeholder="Search product..."
      />
    </div>

    <div class="">
      <h6 class="text-[16px] font-semibold">Categories</h6>

      <div class="flex flex-col gap-2 mt-1">
        @for (category of categories(); track category.id) {
          <label
            [for]="category.id"
            class="flex items-center gap-1 group"
          >
            <input
              type="radio"
              name="Category"
              [id]="category.id"
              [value]="category.id"
              class="appearance-none w-4.5 h-4.5 relative rounded-full border-2 border-border before:w-3 before:h-3
              before:rounded-full before:absolute before:top-1/2 before:left-1/2 before:-translate-x-1/2
              before:-translate-y-1/2 before:bg-primary before:scale-0 checked:before:scale-100 transition-all
              duration-150 before:transition-all before:duration-150"
            />

            <span class="select-none font-medium text-[15px]">{{ category.name }}</span>
          </label>
        }
      </div>
    </div>
  </div>
</div>
