<section class="py-12">
  <div class="container-wrapper">
    <div class="mb-10">
      <h1
        #popularDishesTitle
        class="title"
      >
        popular dishes
      </h1>
    </div>

    <div class="grid lg:grid-cols-3 md:grid-cols-2 sm:grid-cols-2 grid-cols-1 lg:gap-10 gap-5">
      @for (product of products(); track product.id) {
        <div
          #productCard
          [routerLink]="['/product', product.id]"
          class="w-full min-h-112.5 h-auto rounded-radius border-2 border-border cursor-pointer"
        >
          <div class="h-65 w-full overflow-hidden relative rounded-t-radius pointer-events-none">
            <img
              [ngSrc]="product.image"
              fill
              [alt]="product.name"
              class="w-full h-full object-center object-cover"
            />
          </div>

          <div class="py-4 px-3 flex flex-col gap-5">
            <div class="flex flex-col gap-3">
              <h4 class="text-foreground md:text-[22px] text-xl font-bold">{{ product.name }}</h4>
              <p class="text-muted-foreground font-medium md:text-[16px] text-[15px]">
                {{ utils.truncateText({ text: product.description, length: 40 }) }}
              </p>
              <div class="flex items-center gap-1">
                <svg
                  lucideStar
                  [size]="20"
                  strokeWidth="0"
                  class="fill-primary"
                ></svg>
                <span class="font-medium text-foreground text-[15.5px]">{{ product.rate }}</span>
              </div>
            </div>

            <button class="btn bg-primary mt-auto">Add to cart</button>
          </div>
        </div>
      }
    </div>
  </div>
</section>
