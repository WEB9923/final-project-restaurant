<div class="h-screen w-full">
  <div class="container-wrapper w-full h-full grid place-items-center">
    <div
      class="p-8 bg-card shadow-sm rounded-radius border-2 border-border md:w-112.5 lg:w-125 w-full"
    >
      <div class="text-center">
        <h2 class="title">Verify email</h2>
        <p class="subtitle">We sent code to your email</p>
      </div>

      <form
        (submit)="handleVerify($event)"
        novalidate
        class="grid grid-cols-1 gap-4 mt-5"
      >
        <div class="">
          <label for="code">Code</label>
          <input
            type="text"
            placeholder="example: 234572"
            id="code"
            name="code"
            [(ngModel)]="code"
            autocomplete="off"
            class="input h-9 w-full"
          />
          <div class="flex mt-2 justify-end">
            <button
              type="button"
              class="btn text-destructive! h-fit! hover:opacity-75!"
            >
              Resend code
            </button>
          </div>
        </div>

        <button
          type="submit"
          class="btn bg-primary relative col-span-2 overflow-hidden"
        >
          Verify
        </button>
      </form>
    </div>
  </div>
</div>
